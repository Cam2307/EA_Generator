# Permanent dark mode — trading-terminal palette (charcoal + amber + teal).
# Defining ONLY [theme] locks the app to dark regardless of OS preference.

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#D4A853"
backgroundColor = "#0B0F14"
secondaryBackgroundColor = "#141A22"
codeBackgroundColor = "#1A222D"
textColor = "#E8EAED"
linkColor = "#2DD4BF"
borderColor = "#2A3441"
codeTextColor = "#CBD5E1"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "10px"
buttonRadius = "10px"

font = "'Inter':https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
headingFont = "'Inter':https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
baseFontSize = 14
baseFontWeight = 400
codeFontSize = "13px"
headingFontSizes = ["28px", "22px", "18px", "16px", "14px", "12px"]
headingFontWeights = [700, 600, 600, 600, 500, 500]
linkUnderline = false

greenColor = "#2DD4BF"
redColor = "#F87171"
yellowColor = "#D4A853"
orangeColor = "#FB923C"
blueColor = "#38BDF8"
violetColor = "#A78BFA"
grayColor = "#8B95A5"

chartCategoricalColors = [
    "#D4A853", "#2DD4BF", "#A78BFA", "#F87171",
    "#FB923C", "#38BDF8", "#8B95A5", "#14B8A6",
]
chartSequentialColors = [
    "#0B0F14", "#141A22", "#1A222D", "#243040", "#2A3441",
    "#3D4F63", "#5A6B7D", "#8B95A5", "#C4CAD4", "#E8EAED",
]

dataframeBorderColor = "#2A3441"
dataframeHeaderBackgroundColor = "#1A222D"

[theme.sidebar]
backgroundColor = "#0B0F14"
secondaryBackgroundColor = "#141A22"
codeBackgroundColor = "#1A222D"
textColor = "#E8EAED"
borderColor = "#2A3441"
primaryColor = "#D4A853"
